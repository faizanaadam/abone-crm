<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Abone Surgicals CRM · Bangalore</title>
    <meta name="description" content="Abone Surgicals geographic lead directory for 1,244 orthopaedic doctors across Bangalore.">
    <!-- Tailwind CSS (Compiled via Netlify CI/CD) -->
    <link rel="stylesheet" href="tailwind.css" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-900 text-slate-900 h-screen overflow-hidden">

    <!-- MAP fills the full background -->
    <main class="fixed inset-0 z-0">
        <div id="map" class="w-full h-full"></div>
    </main>

    <!-- FAB: Near Me — positioned above the bottom sheet handle -->
    <button id="nearMeBtn"
        class="fixed bottom-[72px] right-4 z-[500] bg-white text-blue-600 p-3.5 rounded-full shadow-2xl hover:bg-blue-50 transition-all active:scale-95 border border-blue-100"
        title="Find Nearest Doctors">
        <i class="ph-fill ph-navigation-arrow text-2xl"></i>
    </button>

    <!-- ============================================================
         BOTTOM SHEET
         Default snap: PEEK (only handle visible, ~56px above bottom)
         ============================================================ -->
    <aside id="bottomSheet"
        class="fixed inset-x-0 bottom-0 z-[400] bg-white rounded-t-3xl flex flex-col will-change-transform"
        style="height: 92vh; transform: translateY(calc(92vh - 56px));">

        <!-- DRAG HANDLE -->
        <div id="dragHandle" class="flex-shrink-0 flex justify-center items-center py-3 cursor-grab active:cursor-grabbing touch-none select-none" style="height: 56px;">
            <div class="w-10 h-1.5 bg-slate-300 rounded-full"></div>
        </div>

        <!-- HEADER: Search + Zone Filters + Spec Filters -->
        <div id="sheetHeader" class="flex-shrink-0 px-4 pb-3 border-b border-slate-100 bg-white">
            <!-- Title Row -->
            <div class="flex items-center justify-between mb-3">
                <div>
                    <h1 class="text-base font-bold text-slate-800 flex items-center gap-1.5">
                        <i class="ph-fill ph-pulse text-red-500"></i> Abone CRM
                    </h1>
                    <p class="text-xs text-slate-400" id="doctorCount">Loading directory...</p>
                </div>
                <div id="db-status" class="flex items-center gap-1.5">
                    <div class="w-2 h-2 rounded-full bg-slate-300" id="db-dot"></div>
                    <span class="text-xs text-slate-400" id="db-label">Connecting</span>
                </div>
            </div>

            <!-- Search -->
            <div class="relative mb-2.5">
                <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                <input type="text" id="searchInput"
                    placeholder="Search doctors, hospitals..."
                    class="w-full pl-8 pr-3 py-2 bg-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all border-0">
            </div>

            <!-- Zone Filters -->
            <div class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar mb-2" id="zoneFilters">
                <button class="zone-filter active" data-zone="all" id="zoneAll">All Zones</button>
                <!-- Zone buttons injected here -->
            </div>

            <!-- Specialization Filters -->
            <div class="flex gap-2 overflow-x-auto pb-1 hide-scrollbar" id="specFilters">
                <button class="spec-filter active" data-spec="all">All Types</button>
                <button class="spec-filter" data-spec="Spine">🔵 Spine</button>
                <button class="spec-filter" data-spec="Trauma">🟠 Trauma</button>
                <button class="spec-filter" data-spec="Both">🟡 Both</button>
                <button class="spec-filter" data-spec="General">⚪ General</button>
            </div>
        </div>

        <!-- DOCTOR LIST VIEW -->
        <div class="flex-1 overflow-y-auto" id="doctorList">
            <div class="flex flex-col items-center justify-center py-16 text-slate-400" id="loadingState">
                <i class="ph ph-spinner-gap animate-spin text-4xl mb-3"></i>
                <p class="text-sm">Loading Directory...</p>
            </div>
        </div>

        <!-- DETAIL VIEW (hidden by default) -->
        <div class="flex-1 flex-col overflow-hidden hidden" id="detail-card">
            <!-- Scrollable content -->
            <div class="flex-1 overflow-y-auto" id="detailContent">
                <!-- Injected via JS -->
            </div>

            <!-- THUMB-ZONE: Back Button pinned to bottom -->
            <div class="flex-shrink-0 p-4 border-t border-slate-100 bg-white">
                <button id="backToListBtn"
                    class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold text-base flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg">
                    <i class="ph ph-arrow-left text-xl"></i> Back to Directory
                </button>
            </div>
        </div>
    </aside>

    <!-- EDIT MODAL -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[600] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" id="editModalContent">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2">
                    <i class="ph-fill ph-pencil-simple text-blue-500"></i> Edit Lead
                </h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-200 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <input type="hidden" id="editDocId">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Phone</label>
                    <input type="text" id="editPhone" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Availability / Timings</label>
                    <input type="text" id="editTiming" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Rep Notes</label>
                    <textarea id="editNotes" rows="3" placeholder="Add field feedback here..." class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all resize-none"></textarea>
                </div>
            </div>
            <div class="p-5 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                <button id="cancelEditBtn" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">Cancel</button>
                <button id="saveEditBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm shadow-blue-200 transition-colors flex items-center gap-2">
                    <span id="saveText">Save Changes</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
</html>
