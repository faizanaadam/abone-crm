<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abone Surgicals CRM</title>
    <!-- Tailwind CSS (Compiled via Netlify CI/CD) -->
    <link rel="stylesheet" href="tailwind.css" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex flex-col md:flex-row">
    <!-- Sidebar / Directory -->
    <aside class="w-full md:w-[400px] bg-white border-r border-slate-200 flex flex-col h-[40vh] md:h-screen z-10 shadow-xl shrink-0 order-2 md:order-1">
        <div class="p-4 border-b border-slate-200 bg-white/80 backdrop-blur-md sticky top-0 z-20">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="ph-fill ph-pulse text-red-500"></i> Abone CRM
            </h1>
            <p class="text-xs text-slate-500 mt-1">Bangalore Lead Directory</p>
            
            <div class="mt-3">
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search doctors, hospitals..." class="w-full pl-9 pr-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
            </div>
            
            <div class="mt-3 flex gap-2 overflow-x-auto pb-1 hide-scrollbar" id="zoneFilters">
                <button class="zone-filter active" data-zone="all">All Zones</button>
                <!-- Zone buttons injected here -->
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50" id="doctorList">
            <div class="text-center text-slate-400 py-10" id="loadingState">
                <i class="ph ph-spinner-gap animate-spin text-3xl"></i>
                <p class="text-sm mt-2">Loading Directory...</p>
            </div>
        </div>
    </aside>

    <!-- Map Container -->
    <main class="flex-1 relative h-[60vh] md:h-screen z-0 order-1 md:order-2">
        <div id="map" class="w-full h-full"></div>
        
        <!-- Near Me Button -->
        <button id="nearMeBtn" class="absolute bottom-6 right-6 z-[400] bg-white text-blue-600 p-3 rounded-full shadow-xl hover:bg-blue-50 transition-all active:scale-95 group border border-blue-100" title="Find 10 Closest Doctors">
            <i class="ph-fill ph-navigation-arrow text-2xl group-hover:animate-pulse"></i>
        </button>
    </main>

    <!-- Edit Modal (Hidden by default) -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[500] hidden items-center justify-center p-4 transition-opacity duration-200 opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-95 duration-200" id="editModalContent">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2"><i class="ph-fill ph-pencil-simple text-blue-500"></i> Edit Lead</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 p-1 rounded-md hover:bg-slate-200 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <input type="hidden" id="editDocId">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Phone</label>
                    <input type="text" id="editPhone" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Availability / Timings</label>
                    <input type="text" id="editTiming" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Rep Notes</label>
                    <textarea id="editNotes" rows="3" placeholder="Add field feedback here..." class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm transition-all resize-none"></textarea>
                </div>
            </div>
            <div class="p-5 bg-slate-50 border-t border-slate-100 flex justify-end gap-2">
                <button id="cancelEditBtn" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">Cancel</button>
                <button id="saveEditBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm shadow-blue-200 transition-colors flex items-center gap-2">
                    <span id="saveText">Save Changes</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
</html>
